<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 16 - E-Commerce Product Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:#fff;
    width:900px;
    display:flex;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    overflow:hidden;
}


.product-images{
    width:50%;
    padding:30px;
    text-align:center;
    background:#f9f9f9;
}

.product-images img{
    width:100%;
    border-radius:15px;
    transition:0.4s;
}

.product-images img:hover{
    transform:scale(1.05);
}

.thumbnail{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:10px;
}

.thumbnail img{
    width:70px;
    height:70px;
    object-fit:cover;
    cursor:pointer;
    border-radius:10px;
    border:2px solid transparent;
    transition:0.3s;
}

.thumbnail img:hover{
    border:2px solid #667eea;
}


.product-details{
    width:50%;
    padding:40px;
}

.product-details h2{
    font-size:28px;
}

.product-details p{
    margin:10px 0;
    color:#555;
}

.price{
    margin:15px 0;
    font-size:22px;
}

.price span{
    color:#e63946;
    font-weight:bold;
}

.old-price{
    text-decoration:line-through;
    color:gray;
    margin-left:10px;
}

.size{
    margin:20px 0;
}

.size button{
    padding:8px 15px;
    margin-right:10px;
    border:1px solid #ccc;
    background:#fff;
    cursor:pointer;
    border-radius:8px;
    transition:0.3s;
}

.size button:hover{
    background:#667eea;
    color:#fff;
}

.size button.active{
    background:#667eea;
    color:#fff;
    border:none;
}

.quantity{
    margin:20px 0;
}

.quantity button{
    padding:6px 15px;
    font-size:18px;
    cursor:pointer;
    border:none;
    background:#ddd;
    border-radius:6px;
}

.quantity input{
    width:40px;
    text-align:center;
    border:none;
    font-size:16px;
}

.cart-btn{
    padding:14px;
    width:100%;
    border:none;
    background:#2a9d8f;
    color:#fff;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.cart-btn:hover{
    background:#21867a;
}


@media(max-width:768px){
    .container{
        flex-direction:column;
        width:100%;
    }
    .product-images, .product-details{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="container">
    
    <div class="product-images">
        <img id="mainImage" 
        src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" 
        alt="Sneakers">
        
        <div class="thumbnail">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" onclick="changeImage(this.src)">
            <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" onclick="changeImage(this.src)">
            <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a" onclick="changeImage(this.src)">
        </div>
    </div>

    <div class="product-details">
        <h2>Premium Sneakers</h2>
        <p>High quality sneakers designed for comfort and style. Perfect for casual and sports wear.</p>

        <div class="price">
            <span>₹2,499</span>
            <span class="old-price">₹3,499</span>
        </div>

        <div class="size">
            <h4>Select Size:</h4><br>
            <button onclick="selectSize(this)">7</button>
            <button onclick="selectSize(this)">8</button>
            <button onclick="selectSize(this)">9</button>
            <button onclick="selectSize(this)">10</button>
        </div>

        <div class="quantity">
            <h4>Quantity:</h4><br>
            <button onclick="changeQty(-1)">-</button>
            <input type="text" id="qty" value="1" readonly>
            <button onclick="changeQty(1)">+</button>
        </div>

        <button class="cart-btn" onclick="addToCart()">Add to Cart</button>
    </div>

</div>

<script>
function changeImage(src){
    document.getElementById("mainImage").src = src;
}

function selectSize(button){
    let buttons = document.querySelectorAll(".size button");
    buttons.forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");
}

function changeQty(change){
    let qtyInput = document.getElementById("qty");
    let current = parseInt(qtyInput.value);
    current += change;
    if(current < 1) current = 1;
    qtyInput.value = current;
}

function addToCart(){
    let qty = document.getElementById("qty").value;
    alert("Product added to cart!\nQuantity: " + qty);
}
</script>

</body>
</html>
